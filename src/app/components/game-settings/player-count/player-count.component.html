<div class="flex flex-col justify-center items-center gap-16 h-full w-full">
  <div class="flex flex-col justify-center gap-16 h-full w-full">
    <div>
      <p
        class="font-ubuntu-bold text-4xl text-center text-primary leading-relaxed"
      >
        How many of you want to play?
      </p>
    </div>
    <form class="h-full">
      <div class="flex flex-row justify-center items-center w-full">
        <div class="flex flex-row items-center gap-8 w-full">
          <div class="flex flex-col w-1/2 gap-4">
            <div
              class="playerCount-button flex flex-row justify-center items-center bg-primary h-36 w-full cursor-pointer rounded-xl"
              (click)="setPlayerMode(1)"
              [ngClass]="{
                'bg-selected': playerCount === 1
              }"
            >
              <i class="fa-solid fa-user text-5xl"></i>
            </div>
            <span
              class="font-ubuntu-bold text-2xl text-center text-primary leading-relaxed"
              >1 Player</span
            >
          </div>
          <div class="flex flex-col w-1/2 gap-4">
            <div
              class="playerCount-button flex flex-row justify-center items-center bg-primary h-36 w-full cursor-pointer rounded-xl hover:bg-button"
              (click)="setPlayerMode(2)"
              [ngClass]="{
                'bg-selected': playerCount === 2
              }"
            >
              <i class="fa-solid fa-user-group text-5xl"></i>
            </div>
            <span
              class="font-ubuntu-bold text-2xl text-center text-primary leading-relaxed"
              >2 Players</span
            >
          </div>
        </div>
      </div>
    </form>
  </div>
  @if (playerCount > 0) {
  <div class="h-14 w-full mb-10">
    <button
      (click)="this.gameSettingsService.nextStep()"
      class="bg-primary font-ubuntu-bold rounded-xl h-full w-full hover:opacity-50 transition-opacity"
    >
      Continue
    </button>
  </div>
  }
</div>
