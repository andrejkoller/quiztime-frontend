<div
  class="flex flex-col items-center justify-center gap-8 h-full w-full"
  [formGroup]="playerForm"
>
  <ng-container formArrayName="players">
    <div
      class="flex flex-col justify-center items-center h-full w-full"
      *ngFor="let player of playerControls; index as i"
      [formGroupName]="i"
    >
      <input
        class="text-center outline-none text-white caret-white bg-theme font-ubuntu-bold text-4xl w-full p-4 rounded-lg"
        formControlName="name"
        placeholder="Enter name :)"
      />
    </div>
  </ng-container>
  <div class="h-14 w-full mb-10">
    <button
      (click)="submitPlayerNames()"
      class="bg-button font-ubuntu-bold rounded-xl h-full w-full hover:opacity-80 transition-opacity"
    >
      Join ({{ playerControls.length }})
    </button>
  </div>
</div>
