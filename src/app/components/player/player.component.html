<div class="flex flex-row items-center gap-16">
  <div
    *ngFor="let player of players"
    class="flex flex-row justify-center items-center rounded-none h-full w-full"
  >
    <div class="flex flex-col justify-center items-center w-full text-primary">
      <div class="w-full">
        <p class="font-ubuntu-bold">{{ player.name }}</p>
      </div>
      <div class="flex flex-row justify-between items-center w-full">
        <i class="fa-solid fa-heart"></i>
        <p class="font-ubuntu-bold">
          {{ player.lives }}
        </p>
      </div>
      <div class="w-full">
        <p class="font-ubuntu-bold">{{ player.points }}</p>
      </div>
    </div>
  </div>
</div>
