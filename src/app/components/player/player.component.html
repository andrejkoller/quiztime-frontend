@if (this.players.length > 0) {
<div class="flex flex-row items-center border-2 rounded-xl p-2 gap-16 w-full">
  <div
    *ngFor="let player of players"
    class="flex flex-row justify-center items-center h-full w-full"
  >
    <div class="flex flex-col justify-center items-center w-full text-primary">
      <div class="flex justify-center w-full">
        <p class="font-ubuntu-bold">{{ player.name }}</p>
      </div>
      <div class="flex flex-row justify-center items-center gap-8 w-full">
        <i class="fa-solid fa-heart"></i>
        <p class="font-ubuntu-bold">
          {{ player.lives }}
        </p>
      </div>
      <div class="flex flex-row justify-center w-full">
        <p class="font-ubuntu-bold">{{ player.points }}</p>
      </div>
    </div>
  </div>
</div>
}
