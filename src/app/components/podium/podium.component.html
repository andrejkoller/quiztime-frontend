<div class="flex flex-col justify-center gap-2 items-center h-screen">
  <div class="flex flex-row items-center justify-end w-full">
    <div>
      <p class="text-primary text-left font-ubuntu-bold">Leaderboard</p>
    </div>
  </div>
  <mat-card class="flex flex-row items-center h-auto w-full">
    <mat-card-content class="w-full">
      <div class="flex flex-col gap-4 w-full">
        <div class="w-full">
          <p class="font-ubuntu-bold mb-8 text-center">
            {{ this.winner }} won the game
          </p>
        </div>
        <div class="flex flex-col w-full gap-4">
          <div class="flex flex-row items-center w-full gap-4">
            <div class="font-ubuntu-bold">1.</div>
            <div class="w-full">
              <mat-card class="w-full winner">
                <mat-card-content
                  ><div class="flex flex-row justify-between">
                    <div>
                      <p class="font-ubuntu-medium font-extrabold">
                        {{ this.winner }}
                      </p>
                    </div>
                    <div><p class="font-ubuntu-bold">15</p></div>
                  </div></mat-card-content
                >
              </mat-card>
            </div>
          </div>
          <div class="flex flex-row items-center w-full gap-4">
            <div class="font-ubuntu-bold">2.</div>
            <div class="w-full">
              <mat-card class="w-full second-place">
                <mat-card-content
                  ><div class="flex flex-row justify-between">
                    <div>
                      <p class="font-ubuntu-medium font-extrabold">Demian</p>
                    </div>
                    <div><p class="font-ubuntu-bold">10</p></div>
                  </div></mat-card-content
                >
              </mat-card>
            </div>
          </div>
          <div class="flex flex-row items-center w-full gap-4">
            <div class="font-ubuntu-bold">3.</div>
            <div class="w-full">
              <mat-card class="w-full third-place">
                <mat-card-content
                  ><div class="flex flex-row justify-between">
                    <div>
                      <p class="font-ubuntu-medium font-extrabold">David</p>
                    </div>
                    <div><p class="font-ubuntu-bold">5</p></div>
                  </div></mat-card-content
                >
              </mat-card>
            </div>
          </div>
          <div class="flex flex-row items-center w-full gap-4">
            <div class="font-ubuntu-bold">4.</div>
            <div class="w-full">
              <mat-card class="w-full other">
                <mat-card-content
                  ><div class="flex flex-row justify-between">
                    <div>
                      <p class="font-ubuntu-medium font-extrabold">Dominik</p>
                    </div>
                    <div><p class="font-ubuntu-bold">2</p></div>
                  </div></mat-card-content
                >
              </mat-card>
            </div>
          </div>
        </div>
      </div>
    </mat-card-content>
    <div class="flex justify-center items-end h-full w-full mb-4 mt-8">
      <button
        class="font-ubuntu-bold rounded-xl border-theme border-2 w-3/5 h-10"
        routerLink="/game-settings"
      >
        Restart
      </button>
    </div>
  </mat-card>
  <div class="flex flex-col items-center gap-4 w-full">
    <div>
      <p class="text-primary font-ubuntu-bold">or</p>
    </div>
    <div class="flex justify-center items-end w-full">
      <button
        class="font-ubuntu-bold rounded-xl text-primary border-primary border-2 w-3/5 h-10"
        routerLink="/"
      >
        Quit
      </button>
    </div>
  </div>
</div>
