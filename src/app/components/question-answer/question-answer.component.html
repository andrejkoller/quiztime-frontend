<div *ngIf="quizService.questions.length === 0">
  <p class="text-primary text-center font-ubuntu-bold text-2xl">
    Loading questions...
  </p>
</div>
<div class="flex flex-col gap-8">
  <div
    *ngIf="this.quizService.questions.length > 0"
    class="flex flex-col gap-4"
  >
    <div *ngIf="quizService.questions[quizService.currentQuestionIndex]">
      <p class="text-accent text-center">
        Question {{ this.quizService.currentQuestionIndex }} out of
        {{ this.quizService.questions.length }}
      </p>
    </div>
    <p
      class="text-primary text-center font-ubuntu-bold text-2xl"
      [innerHTML]="
        this.quizService.questions[this.quizService.currentQuestionIndex]
          ?.question
      "
    ></p>
  </div>
  <div class="flex flex-col gap-4 justify-end w-full">
    <button
      *ngFor="
        let answer of this.quizService.questions[
          this.quizService.currentQuestionIndex
        ]?.answers
      "
      class="answers focus:bg-button font-ubuntu-bold bg-primary rounded-xl text-center h-14 w-full transition"
    >
      {{ answer }}
    </button>
  </div>
</div>
