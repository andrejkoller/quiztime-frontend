<div *ngIf="this.quizService.questions.length > 0" class="flex flex-col gap-4">
  <div>
    <p class="text-accent text-center">
      Question {{ this.quizService.currentQuestionIndex }} out of
      {{ this.quizService.questions.length }}
    </p>
  </div>
  <p
    class="text-primary text-center font-ubuntu-bold text-2xl"
    [innerHTML]="
      this.quizService.questions[this.quizService.currentQuestionIndex].question
    "
  ></p>
</div>
