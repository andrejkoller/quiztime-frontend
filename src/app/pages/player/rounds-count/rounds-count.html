<div class="flex flex-col items-start justify-start gap-4">
  <p class="text-base text-left text-muted-text">
    Select the number of rounds you want to play
  </p>
  <form class="flex flex-row justify-center gap-4">
    <button
      type="submit"
      class="rounded-full h-12 mx-auto"
      (click)="decrementRoundsCount()"
    >
      <lucide-icon [name]="ArrowLeft" class="w-6 h-6"></lucide-icon>
    </button>
    <input
      type="number"
      min="1"
      max="20"
      class="rounded-full w-full h-12 mx-auto px-4"
      [formControl]="questionCapacity"
      name="roundsCount"
    />
    <button
      type="submit"
      class="rounded-full h-12 mx-auto"
      (click)="incrementRoundsCount()"
    >
      <lucide-icon [name]="ArrowRight" class="w-6 h-6"></lucide-icon>
    </button>
  </form>
</div>
